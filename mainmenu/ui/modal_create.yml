page:
  size:
    w: 15.5
    h: 8.0
  children:
    - card:
        children:
          - section:
              title: Pack identity
              children:
                - row:
                    children:
                      - field:
                          name: pack_id
                          label: Pack id
                          w: 3.0
                          default: "${pack_id}"
                      - field:
                          name: pack_name
                          label: Name
                          w: 4.0
                          default: "${pack_name}"
                      - field:
                          name: pack_version
                          label: Version
                          w: 2.0
                          default: "${pack_version}"
                      - field:
                          name: pack_author
                          label: Author
                          w: 4.5
                          default: "${pack_author}"
                - row:
                    children:
                      - field:
                          name: base_id
                          label: Base id
                          w: 3.0
                          default: "${base_id}"
                      - field:
                          name: base_version
                          label: Base ver
                          w: 1.8
                          default: "${base_version}"
                      - field:
                          name: pack_description
                          label: Description
                          w: 8.7
                          default: "${pack_description}"
    - row:
        flex: 1
        children:
          - card:
              flex: 1
              children:
                - section:
                    title: ContentDB search
                    flex: 1
                    children:
                      - row:
                          children:
                            - field:
                                name: search_query
                                label: Query
                                w: 2.5
                                flex: 1
                                default: "${search_query}"
                            - field:
                                name: search_release
                                label: Release
                                w: 1.3
                                default: "${search_release}"
                            - icon-button:
                                name: search
                                icon: search
                                label: Search
                                variant: primary
                                w: 1.2
                                h: 0.9
                            - icon-button:
                                name: add_search
                                icon: plus
                                label: Add
                                variant: secondary
                                w: 1.0
                                h: 0.9
                      - list:
                          name: search_results
                          items: "${search_results | format_search_result}"
                          selected: "${search_selected}"
                          flex: 1
                      - status:
                          text: "${status}"
          - card:
              flex: 1
              children:
                - section:
                    title: Current mods
                    flex: 1
                    children:
                      - list:
                          name: mod_list
                          items: "${mods | format_mod_entry}"
                          selected: "${mod_selected}"
                          flex: 1
                      - actions:
                          children:
                            - icon-button:
                                name: remove_mod
                                icon: trash
                                label: Remove
                                variant: danger
                                w: 1.8
                                h: 0.8
                            - icon-button:
                                name: export
                                icon: save
                                label: Export
                                variant: primary
                                w: 2.2
                                h: 0.8
                            - button:
                                name: dlg_close
                                label: Close
                                w: 1.5
                                h: 0.8
