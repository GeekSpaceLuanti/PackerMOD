page:
  size:
    w: 9
    h: 4.0
  children:
    - card:
        flex: 1
        children:
          - section:
              title: PackerMOD Settings
              flex: 1
              children:
                - label:
                    text: "User data path: ${user_path}"
                    style: dim
                - label:
                    text: "PackerMOD version: ${version}"
                    style: dim
                - label:
                    text: "Luanti version: ${luanti_version}"
                    style: dim
                - status:
                    text: "${status}"
                - spacer:
                    flex: 1
                - actions:
                    children:
                      - icon-button:
                          name: open_luanti_settings
                          icon: sliders
                          label: Open Luanti settings
                          variant: secondary
                          w: 4.0
                          h: 0.8
                      - button:
                          name: dlg_close
                          label: Close
                          w: 2.0
                          h: 0.8
