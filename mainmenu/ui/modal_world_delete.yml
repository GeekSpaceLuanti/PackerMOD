page:
  size:
    w: 11
    h: 4.5
  children:
    - card:
        flex: 1
        children:
          - section:
              title: Delete World
              flex: 1
              children:
                - label:
                    text: "Pack: ${pack_name}"
                    style: dim
                - label:
                    text: "World: ${world_display}"
                - label:
                    text: "This cannot be undone."
                    style: dim
                - status:
                    text: "${status}"
                - spacer:
                    flex: 1
                - actions:
                    children:
                      - button:
                          name: dlg_close
                          label: Cancel
                          w: 2.5
                          h: 0.9
                      - icon-button:
                          name: confirm_delete
                          icon: trash
                          label: Delete
                          variant: danger
                          w: 3.0
                          h: 0.9
