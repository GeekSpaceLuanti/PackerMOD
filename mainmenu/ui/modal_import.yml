page:
  size:
    w: 12
    h: 5.5
  children:
    - card:
        flex: 1
        children:
          - section:
              title: Import a Pack
              flex: 1
              children:
                - label:
                    text: "Paste an http(s) URL or a local path to a .zip / manifest.yaml"
                    style: dim
                - row:
                    children:
                      - field:
                          name: source
                          label: Source
                          flex: 1
                          h: 0.8
                          default: "${source}"
                      - icon-button:
                          name: import
                          icon: download
                          label: Import
                          variant: primary
                          w: 2.5
                          h: 0.8
                - status:
                    text: "${status}"
                - spacer:
                    flex: 1
                - actions:
                    children:
                      - button:
                          name: dlg_close
                          label: Close
                          w: 2.0
                          h: 0.8
