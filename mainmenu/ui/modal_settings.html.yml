# PackerMOD Settings modal (HTML 風 DSL)。

root:
  tag: page
  class: modal-page
  children:
    - tag: spacer
      class: modal-vspacer
    - tag: div
      class: modal-center-row
      children:
        - tag: spacer
          class: modal-hspacer
        - tag: card
          class: modal-card
          children:
            - tag: h2
              class: modal-title
              text: "PackerMOD Settings"
            - tag: span
              class: modal-dim
              text: "User data path: ${user_path}"
            - tag: span
              class: modal-dim
              text: "PackerMOD version: ${version}"
            - tag: span
              class: modal-dim
              text: "Luanti version: ${luanti_version}"
            - tag: status
              class: modal-status
              text: "${status}"
            - tag: spacer
              class: modal-vspacer
            - tag: footer
              class: modal-actions
              children:
                - tag: icon-button
                  class: "modal-icon-btn"
                  attrs:
                    name: open_luanti_settings
                    icon: sliders
                    label: "Open Luanti settings"
                - tag: button
                  class: "modal-btn"
                  attrs:
                    name: dlg_close
                    label: Close
        - tag: spacer
          class: modal-hspacer
    - tag: spacer
      class: modal-vspacer
