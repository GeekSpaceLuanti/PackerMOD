# New World modal (HTML 風 DSL)。

root:
  tag: page
  class: modal-page
  children:
    - tag: spacer
      class: modal-vspacer
    - tag: div
      class: modal-center-row
      children:
        - tag: spacer
          class: modal-hspacer
        - tag: card
          class: modal-card
          children:
            - tag: h2
              class: modal-title
              text: "New World"
            - tag: span
              class: modal-dim
              text: "Pack: ${pack_name}"
            - tag: field
              class: modal-field
              attrs:
                name: world_name
                label: "World name"
                default: "${world_name}"
            - tag: span
              class: modal-dim
              text: "Letters, numbers, _ and - are kept. Other characters become _."
            - tag: status
              class: modal-status
              text: "${status}"
            - tag: spacer
              class: modal-vspacer
            - tag: footer
              class: modal-actions
              children:
                - tag: button
                  class: "modal-btn"
                  attrs:
                    name: dlg_close
                    label: Cancel
                - tag: icon-button
                  class: "modal-icon-btn modal-btn-primary"
                  attrs:
                    name: confirm_create
                    icon: play
                    label: "Create & Play"
        - tag: spacer
          class: modal-hspacer
    - tag: spacer
      class: modal-vspacer
