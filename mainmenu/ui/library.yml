page:
  size:
    w: 15.5
    h: 8.0
  children:
    - row:
        flex: 1
        children:
          - col:
              w: 5.0
              children:
                - card:
                    flex: 1
                    children:
                      - section:
                          title: Packs
                          flex: 1
                          children:
                            - list:
                                name: packlist
                                items: "${packs | format_pack_label}"
                                selected: "${selected_pack}"
                                flex: 1
                            - row:
                                spacing: sm
                                children:
                                  - icon-button:
                                      name: btn_import
                                      icon: download
                                      label: Import
                                      w: 1.4
                                      h: 0.8
                                  - icon-button:
                                      name: btn_create
                                      icon: plus
                                      label: Create
                                      w: 1.4
                                      h: 0.8
                                  - icon-button:
                                      name: btn_settings
                                      icon: sliders
                                      label: Settings
                                      w: 1.4
                                      h: 0.8
          - col:
              flex: 1
              children:
                - card:
                    flex: 1
                    children:
                      - status:
                          text: "No pack selected. Use Import to install one or Create to start fresh."
                          when: "${no_pack}"
                      - label:
                          text: "${pack_name}"
                          style: section
                          when: "${has_pack}"
                      - label:
                          text: "v${pack_version}   base=${pack_base}   mods=${pack_mods_count}"
                          style: dim
                          when: "${has_pack}"
                      - row:
                          when: "${has_pack}"
                          children:
                            - button:
                                name: subtab_worlds
                                label: Worlds
                                variant: "${variant_worlds}"
                                flex: 1
                                h: 0.7
                            - button:
                                name: subtab_multi
                                label: Multiplayer
                                variant: "${variant_multi}"
                                flex: 1
                                h: 0.7
                            - button:
                                name: subtab_mods
                                label: Mods
                                variant: "${variant_mods}"
                                flex: 1
                                h: 0.7
                            - button:
                                name: subtab_info
                                label: Info
                                variant: "${variant_info}"
                                flex: 1
                                h: 0.7
                      - section:
                          flex: 1
                          when: "${show_worlds}"
                          children:
                            - list:
                                name: worldlist
                                items: "${worlds | format_world_label}"
                                selected: "${selected_world}"
                                flex: 1
                            - status:
                                text: "No worlds yet. Press New World to create one."
                                when: "${no_world}"
                            - actions:
                                children:
                                  - icon-button:
                                      name: new_world
                                      icon: plus
                                      label: New World
                                      w: 3.0
                                      h: 0.8
                                  - icon-button:
                                      name: play_world
                                      icon: play
                                      label: Play
                                      variant: primary
                                      when: "${has_world}"
                                      w: 3.0
                                      h: 0.8
                      - section:
                          flex: 1
                          when: "${show_multi}"
                          children:
                            - list:
                                name: serverlist
                                items: "${servers | format_server_label}"
                                selected: "${selected_server}"
                                flex: 1
                            - status:
                                text: "No servers yet. Fill the form below and press Add."
                                when: "${no_server}"
                            - row:
                                spacing: sm
                                children:
                                  - field:
                                      name: server_name
                                      label: Name
                                      w: 2.5
                                      default: "${form_server_name}"
                                  - field:
                                      name: server_address
                                      label: Address
                                      w: 3.5
                                      default: "${form_server_address}"
                                  - field:
                                      name: server_port
                                      label: Port
                                      w: 1.3
                                      default: "${form_server_port}"
                            - actions:
                                children:
                                  - icon-button:
                                      name: server_add
                                      icon: plus
                                      label: Add
                                      w: 1.8
                                      h: 0.8
                                  - icon-button:
                                      name: server_remove
                                      icon: trash
                                      label: Remove
                                      variant: danger
                                      w: 1.8
                                      h: 0.8
                                      when: "${has_server}"
                                  - icon-button:
                                      name: server_connect
                                      icon: play
                                      label: Connect
                                      variant: primary
                                      w: 2.2
                                      h: 0.8
                                      when: "${has_server}"
                      - section:
                          flex: 1
                          when: "${show_mods}"
                          children:
                            - row:
                                spacing: sm
                                children:
                                  - field:
                                      name: search_query
                                      label: Search ContentDB
                                      flex: 1
                                      default: "${search_query}"
                                  - field:
                                      name: search_release
                                      label: Release
                                      w: 1.5
                                      default: "${search_release}"
                                  - icon-button:
                                      name: do_search
                                      icon: search
                                      label: Search
                                      w: 1.5
                                      h: 0.9
                            - status:
                                text: "${mod_status}"
                            - row:
                                flex: 1
                                spacing: md
                                children:
                                  - col:
                                      flex: 1
                                      children:
                                        - label:
                                            text: "Current"
                                            style: section
                                        - list:
                                            name: mod_list
                                            items: "${pack_mods | format_mod_entry}"
                                            selected: "${selected_mod}"
                                            flex: 1
                                        - icon-button:
                                            name: mod_remove
                                            icon: trash
                                            label: Remove
                                            variant: danger
                                            w: 2.5
                                            h: 0.8
                                            when: "${has_mod}"
                                  - col:
                                      flex: 1
                                      children:
                                        - label:
                                            text: "Search results"
                                            style: section
                                        - list:
                                            name: search_results
                                            items: "${search_results | format_search_result}"
                                            selected: "${selected_search}"
                                            flex: 1
                                        - icon-button:
                                            name: mod_add
                                            icon: plus
                                            label: Add
                                            variant: primary
                                            w: 2.5
                                            h: 0.8
                                            when: "${has_search_result}"
                      - section:
                          flex: 1
                          when: "${show_info}"
                          children:
                            - field:
                                name: info_name
                                label: Name
                                default: "${pack_name}"
                            - row:
                                children:
                                  - field:
                                      name: info_version
                                      label: Version
                                      w: 3.0
                                      default: "${pack_version}"
                                  - label:
                                      text: "Base: ${pack_base}"
                                      style: dim
                            - textarea:
                                name: info_description
                                label: Description
                                flex: 1
                                default: "${pack_description}"
                            - status:
                                text: "${info_status}"
                            - actions:
                                children:
                                  - icon-button:
                                      name: info_save
                                      icon: save
                                      label: Save Changes
                                      variant: primary
                                      w: 3.0
                                      h: 0.8
