page:
  size:
    w: 15.5
    h: 8.0
  children:
    - card:
        flex: 1
        children:
          - section:
              title: Installed Packs
              flex: 1
              children:
                - list:
                    name: packlist
                    items: "${packs | format_pack_label}"
                    selected: "${selected}"
                    flex: 1
                - status:
                    text: "${description}"
                - actions:
                    children:
                      - icon-button:
                          name: refresh
                          icon: reload
                          label: Refresh
                          variant: secondary
                          w: 3.0
                          h: 0.8
                      - icon-button:
                          name: play
                          icon: play
                          label: Play
                          variant: primary
                          when: "${has_selection}"
                          w: 3.0
                          h: 0.8
