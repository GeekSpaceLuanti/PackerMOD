page:
  size:
    w: 11
    h: 5.0
  children:
    - card:
        flex: 1
        children:
          - section:
              title: New World
              flex: 1
              children:
                - label:
                    text: "Pack: ${pack_name}"
                    style: dim
                - field:
                    name: world_name
                    label: World name
                    h: 0.9
                    default: "${world_name}"
                - label:
                    text: "Letters, numbers, _ and - are kept. Other characters become _."
                    style: dim
                - status:
                    text: "${status}"
                - spacer:
                    flex: 1
                - actions:
                    children:
                      - button:
                          name: dlg_close
                          label: Cancel
                          w: 2.5
                          h: 0.9
                      - icon-button:
                          name: confirm_create
                          icon: play
                          label: Create & Play
                          variant: primary
                          w: 3.5
                          h: 0.9
