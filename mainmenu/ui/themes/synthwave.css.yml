# Synthwave テーマ. library.html.yml に対するスタイル。
# 紺→紫→ピンク→イエローの sunset グラデ + outrun 床グリッド + accent ピンク。
#
# 寸法は formspec size[30, 16] (= window 1608x853, 1 unit ≈ 52 px) 前提。

variables:
  --fg: "#f0e6ff"
  --fg-dim: "#b09ad8"
  --accent-purple: "#A06EFF"
  --accent-pink: "#FF52A4"
  --accent-yellow: "#FFD400"
  --card-bg: "#28114f"

rules:
  - selector: "page"
    style:
      bg: "#1a0a3a"
      bg-image: "url(packermod_bg_synthwave.png)"
      padding: 0.8
      flex-direction: column
      gap: 0.8

  - selector: ".title-bar"
    style:
      flex-direction: row
      justify: space-between
      gap: 0.8
      h: 1.8
      align: center

  - selector: "#title"
    style:
      color: "#FF52A4"
      font-size: "*3.5"

  - selector: ".subtitle"
    style:
      color: "#FFD400"
      font-size: "*1.6"

  - selector: "#no-packs-msg"
    style:
      color: "#f0e6ff"
      font-size: "*1.4"

  - selector: ".pack-grid"
    style:
      display: grid
      grid-columns: 3
      gap: 0.6
      flex: 1

  - selector: ".pack-card"
    style:
      bg: "#28114f"
      border-width: 0.08
      border-color: "#A06EFF"
      padding: 0.4
      flex-direction: column
      align: center
      gap: 0.2
      w: 8.5
      h: 8.0

  # 空きスロットを埋める薄いプレースホルダ。formspec は点線をサポートしないので
  # 薄い実線枠と透明寄り bg で代用する。
  - selector: ".pack-card-placeholder"
    style:
      bg: "#1a0a3a55"
      border-width: 0.06
      border-color: "#A06EFF55"
      w: 8.5
      h: 8.0

  - selector: ".pack-thumb"
    style:
      w: 5.5
      h: 5.5

  - selector: ".pack-name"
    style:
      color: "#f0e6ff"
      font-size: "*1.5"

  - selector: ".pack-meta"
    style:
      color: "#FF52A4"
      font-size: "*1.2"

  - selector: ".action-bar"
    style:
      bg: "#0a061faa"
      border-width: 0.08
      border-color: "#A06EFF"
      flex-direction: row
      justify: end
      gap: 1.0
      h: 3.0
      padding: 0.3

  - selector: ".action-btn"
    style:
      w: 4.0
      h: 2.7

# ===== 画面2 (Pack Detail) スタイル =====

  - selector: ".detail-header"
    style:
      flex-direction: row
      align: center
      gap: 0.6
      h: 1.5

  - selector: ".back-btn"
    style:
      w: 3.0
      h: 1.5

  - selector: ".detail-title"
    style:
      color: "#FF52A4"
      font-size: "*2.5"

  - selector: ".detail-spacer"
    style:
      flex: 1

  - selector: ".detail-meta"
    style:
      color: "#FFD400"
      font-size: "*1.2"

  - selector: ".subtab-bar"
    style:
      flex-direction: row
      gap: 0.3
      h: 1.3

  - selector: ".subtab-btn"
    style:
      flex: 1
      h: 1.3
      bg: "#28114f"
      color: "#f0e6ff"
      font-size: "*1.3"

  - selector: ".subtab-btn-active"
    style:
      bg: "#A06EFF"
      color: "#1a0a3a"

  - selector: ".subtab-pane"
    style:
      flex: 1
      flex-direction: column
      gap: 0.4
      bg: "#1a0a3acc"
      padding: 0.4
      border-width: 0.05
      border-color: "#A06EFF"

  - selector: ".detail-list"
    style:
      flex: 1
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".empty-status"
    style:
      color: "#FFD400"
      font-size: "*1.2"
      h: 1.0

  - selector: ".subtab-actions"
    style:
      flex-direction: row
      justify: end
      gap: 0.6
      h: 1.6

  # 画面2 の action-btn は画面1 用 (4.0x2.7) のまま入れると subtab-actions を超えて
  # OOB するので子孫 selector で小さく上書き。
  - selector: ".subtab-actions .action-btn"
    style:
      w: 3.5
      h: 1.6

  - selector: ".form-row"
    style:
      flex-direction: row
      gap: 0.4
      h: 1.8

  - selector: ".form-field"
    style:
      flex: 1
      h: 1.2
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".form-field-narrow"
    style:
      w: 4.5
      h: 1.2
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".form-textarea"
    style:
      h: 1.6
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".mods-grid"
    style:
      flex: 1
      flex-direction: row
      gap: 0.6

  - selector: ".mods-col"
    style:
      flex: 1
      flex-direction: column
      gap: 0.3

  - selector: ".mods-col-title"
    style:
      color: "#FF52A4"
      font-size: "*1.4"
      h: 0.8

  - selector: ".info-base"
    style:
      color: "#FFD400"
      font-size: "*1.1"
      align: center

# ===== Modal 共通スタイル =====
# 各 modal は size[30, 16] で page を取り、外側を bgcolor(both) で塗りつぶした上で
# 画面中央に modal-card を配置する。これで雲・Luanti デフォ背景が完全に隠れる。

  - selector: ".modal-page"
    style:
      bg: "#1a0a3a"
      bg-image: "url(packermod_bg_synthwave.png)"
      padding: 0.8
      flex-direction: column

  - selector: ".modal-vspacer"
    style:
      flex: 1

  - selector: ".modal-center-row"
    style:
      flex-direction: row

  - selector: ".modal-hspacer"
    style:
      flex: 1

  - selector: ".modal-card"
    style:
      bg: "#28114f"
      border-width: 0.08
      border-color: "#A06EFF"
      padding: 0.6
      flex-direction: column
      gap: 0.3
      w: 16.0
      h: 9.0

  - selector: ".modal-card-narrow"
    style:
      w: 13.0
      h: 8.0

  - selector: ".modal-card-mid"
    style:
      w: 18.0
      h: 9.0

  - selector: ".modal-title"
    style:
      color: "#FF52A4"
      font-size: "*2.2"
      h: 1.2

  - selector: ".modal-dim"
    style:
      color: "#b09ad8"
      font-size: "*1.1"

  - selector: ".modal-info"
    style:
      color: "#f0e6ff"
      font-size: "*1.2"

  - selector: ".modal-status"
    style:
      color: "#FFD400"
      font-size: "*1.1"
      h: 0.8

  - selector: ".modal-field"
    style:
      h: 1.2
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".modal-actions"
    style:
      flex-direction: row
      justify: end
      gap: 0.5
      h: 1.8

  - selector: ".modal-btn"
    style:
      w: 3.0
      h: 1.6
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".modal-btn-primary"
    style:
      w: 4.0
      h: 1.6
      bg: "#A06EFF"
      color: "#1a0a3a"

  - selector: ".modal-btn-danger"
    style:
      w: 3.5
      h: 1.6
      bg: "#FF52A4"
      color: "#1a0a3a"

  - selector: ".modal-icon-btn"
    style:
      w: 4.0
      h: 1.6

  # modal_create / modal_import で使う追加スタイル
  - selector: ".modal-row"
    style:
      flex-direction: row
      gap: 0.4
      h: 1.8

  - selector: ".modal-field-grow"
    style:
      flex: 1
      h: 1.2
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".modal-field-create"
    style:
      w: 3.2
      h: 1.2
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".modal-field-create-grow"
    style:
      flex: 1
      h: 1.2
      bg: "#28114f"
      color: "#f0e6ff"

  - selector: ".modal-icon-btn-small"
    style:
      w: 2.4
      h: 1.5

  - selector: ".modal-list"
    style:
      flex: 1
      bg: "#1a0a3a"
      color: "#f0e6ff"

  - selector: ".modal-create-body"
    style:
      flex: 1
      flex-direction: row
      gap: 0.6

  - selector: ".modal-create-col"
    style:
      flex: 1
      flex-direction: column
      gap: 0.3

  - selector: ".modal-section-label"
    style:
      color: "#FF52A4"
      font-size: "*1.3"
      h: 0.8

  - selector: ".modal-card-wide"
    style:
      w: 26.0
      h: 12.5

media:
  - query: "max-width 20.0"
    rules:
      - selector: ".pack-grid"
        style:
          grid-columns: 2
