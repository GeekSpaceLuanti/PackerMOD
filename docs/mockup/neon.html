<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PackerMOD — Neon Cyberpunk</title>
<link rel="stylesheet" href="_shared.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:        #0a0a18;
  --bg-panel:  #11112a;
  --bg-card:   #14143a;
  --fg:        #e0e0ff;
  --fg-dim:    #7a7aa8;
  --accent:    #00ffe5;  /* neon cyan */
  --accent2:   #ff1b8d;  /* hot magenta */
  --border:    #00ffe5;
  --border-w:  1px;
  --font:        "Share Tech Mono", monospace;
  --font-display:"Orbitron", "Share Tech Mono", monospace;
}

body {
  background:
    radial-gradient(ellipse at 50% 100%, rgba(255,27,141,0.20), transparent 60%),
    radial-gradient(ellipse at 0% 0%,    rgba(0,255,229,0.15),  transparent 50%),
    var(--bg);
  position: relative;
}

/* Subtle scanlines across entire viewport */
body::before {
  content: "";
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 100;
}

.app-header {
  border-bottom-color: var(--accent);
  border-bottom-width: 2px;
}
.app-header .title {
  color: var(--accent);
  text-shadow: 0 0 8px rgba(0,255,229,0.6), 0 0 16px rgba(0,255,229,0.3);
}
.app-header .title::before { content: "> "; color: var(--accent2); }
.app-header .title::after  { content: "_";   color: var(--accent); animation: blink 1s steps(1) infinite; }
.app-header .subtitle {
  color: var(--accent2);
  text-shadow: 0 0 6px rgba(255,27,141,0.5);
}

@keyframes blink { 50% { opacity: 0; } }

.pack-card {
  border-color: var(--accent);
  background: linear-gradient(180deg, rgba(0,255,229,0.06), rgba(255,27,141,0.04));
  transition: none;
}
.pack-card:hover {
  border-color: var(--accent2);
  box-shadow: inset 0 0 24px rgba(255,27,141,0.25);
}
.pack-card .thumb {
  background: #000;
  border: 1px solid rgba(0,255,229,0.4);
}
.pack-card .name {
  color: var(--fg);
  text-shadow: 0 0 4px rgba(0,255,229,0.5);
}
.pack-card .base { color: var(--accent2); }

.actions {
  border-top-color: var(--accent);
  border-top-width: 2px;
}

.icon-btn {
  border-color: var(--accent);
  background: rgba(0,255,229,0.04);
}
.icon-btn:hover {
  border-color: var(--accent2);
  background: rgba(255,27,141,0.08);
}
.icon-btn .ico { color: var(--accent); }
.icon-btn .lbl {
  color: var(--accent);
  border-top: 1px solid rgba(0,255,229,0.5);
  padding-top: 4px;
  width: 100%;
  text-align: center;
}
</style>
</head>
<body>
<div id="app"></div>
<script src="_shared.js"></script>
<script>renderApp({ title: "PACKERMOD", subtitle: "// PACK_LIBRARY" });</script>
</body>
</html>
