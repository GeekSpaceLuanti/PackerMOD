<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PackerMOD — Synthwave Sunset</title>
<link rel="stylesheet" href="_shared.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:        #1a0a3a;
  --bg-panel:  #28114f;
  --bg-card:   rgba(40, 17, 79, 0.6);
  --fg:        #f0e6ff;
  --fg-dim:    #b09ad8;
  --accent:    #A06EFF;   /* synthwave purple */
  --accent2:   #FF52A4;   /* hot pink */
  --accent3:   #FFD400;   /* sunset yellow */
  --border:    #A06EFF;
  --border-w:  1px;
  --font:        "Space Grotesk", sans-serif;
  --font-display:"Major Mono Display", monospace;
}

body {
  background:
    /* sunset gradient (top: violet sky, mid: pink, bottom: deep purple) */
    linear-gradient(180deg,
      #1a0a3a 0%,
      #3a0e5a 35%,
      #6a1280 55%,
      #b02080 70%,
      #ff52a4 80%,
      #ffd400 90%,
      #1a0a3a 92%,
      #0a0028 100%);
  position: relative;
  overflow: hidden;
}

/* Horizontal grid lines (synthwave perspective floor) */
body::before {
  content: "";
  position: fixed;
  left: 0; right: 0;
  bottom: 0; height: 50%;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 24px,
      rgba(255,82,164,0.35) 24px,
      rgba(255,82,164,0.35) 26px
    ),
    repeating-linear-gradient(
      to right,
      transparent 0,
      transparent 60px,
      rgba(160,110,255,0.35) 60px,
      rgba(160,110,255,0.35) 62px
    );
  pointer-events: none;
  z-index: 0;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0.0) 0%, rgba(0,0,0,1) 80%);
  -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.0) 0%, rgba(0,0,0,1) 80%);
}

.app { position: relative; z-index: 1; }

.app-header {
  border-bottom: 2px solid transparent;
  border-image: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3)) 1;
}
.app-header .title {
  font-size: 32px;
  background: linear-gradient(90deg, var(--accent3), var(--accent2), var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(255,82,164,0.4);
  letter-spacing: 0.15em;
}
.app-header .subtitle {
  color: var(--accent3);
  text-shadow: 0 0 8px rgba(255,212,0,0.5);
  font-family: var(--font-display);
}

.pack-card {
  background: rgba(40,17,79,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid transparent;
  background-image:
    linear-gradient(rgba(40,17,79,0.7), rgba(40,17,79,0.7)),
    linear-gradient(135deg, var(--accent), var(--accent2));
  background-origin: border-box;
  background-clip: padding-box, border-box;
}
.pack-card:hover {
  box-shadow: 0 0 20px rgba(255,82,164,0.5);
}
.pack-card .thumb {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(160,110,255,0.5);
}
.pack-card .name {
  color: var(--fg);
  font-weight: 700;
  text-shadow: 0 0 8px rgba(160,110,255,0.7);
}
.pack-card .base { color: var(--accent2); }

.actions {
  border-top: 2px solid transparent;
  border-image: linear-gradient(90deg, var(--accent3), var(--accent2), var(--accent)) 1;
}

.icon-btn {
  border: 1px solid transparent;
  background-image:
    linear-gradient(rgba(40,17,79,0.5), rgba(40,17,79,0.5)),
    linear-gradient(135deg, var(--accent), var(--accent2));
  background-origin: border-box;
  background-clip: padding-box, border-box;
}
.icon-btn:hover { box-shadow: 0 0 16px rgba(255,82,164,0.6); }
.icon-btn .ico { color: var(--accent2); }
.icon-btn .lbl {
  color: var(--fg);
  font-family: var(--font-display);
  letter-spacing: 0.15em;
  text-shadow: 0 0 6px rgba(255,82,164,0.5);
}
</style>
</head>
<body>
<div id="app"></div>
<script src="_shared.js"></script>
<script>renderApp({ title: "PackerMOD", subtitle: "pack library" });</script>
</body>
</html>
